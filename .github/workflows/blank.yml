# This is a basic workflow to help you get started with Actions
# /home/runner/work/anaction/anaction

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.

      # get minijinja
      - name: Get minijinja  
        run: | 
          curl -sSfL https://github.com/mitsuhiko/minijinja/releases/latest/download/minijinja-cli-installer.sh | sh
          ls -al $HOME/.local/bin
      # use minijinja
      - name: use minijinja 
        run: | 
          echo "GITHUB_WORKSPACE is $GITHUB_WORKSPACE"
          echo "Hello {{ name }}" | minijinja-cli - -Dname=World
          minijinja-cli --strict $GITHUB_WORKSPACE/connecting.md $GITHUB_WORKSPACE/gent.yml > $GITHUB_WORKSPACE/test.md
          pwd
          set -xv
          minijinja-cli --strict connecting.md gent.yml > test2.md
          minijinja-cli --strict mkdocs/docs/HPC/connecting.md gent.yml > zdocs/docs/connecting.md
          
      # add zensical    
      - name: Install uv
        uses: astral-sh/setup-uv@v7

#      - name: update uv
#        run: uv self update
      - run: uv self version

      - name: Install the project
        run: uv sync --all-extras --dev        

      - name: Install zensical
        run: uv pip install zensical

      - name: Where is zensical 
        run: |
          set -vx
          find $HOME -type f -name zensical -ls
          export PATH=$GITHUB_WORKSPACE/.venv/bin:$PATH
          echo $PATH | tr \: \\n
          which -a zensical
          zensical --version

      # run zensical debug with python -duv 
      - name: Build the site
        run: |
          cd zdocs
          zensical build --clean

      # check git
      - name: Check git
        run: | 
          # configure Git
          git config user.email "${{github.event.pusher.email}}"
          git config user.name "${{github.event.pusher.name}}"
          set -xv
          git status
          git remote -v
          git add --verbose .
          # git add --verbose 'zdocs/docs/connecting.md'
          git commit -m 'adding everything'
          git push --verbose
          git status
          ls -alrt

      # upload to ghpages
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          # path: '.'
          # path: "$GITHUB_WORKSPACE"
          path: '/home/runner/work/anaction/anaction'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

